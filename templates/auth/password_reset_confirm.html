{% extends 'base.html' %}
{% block title %}Set New Password - EduTrack{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div class="card" style="width:100%;max-width:460px">
    <h2 style="font-family:'Outfit',sans-serif;margin-bottom:8px">Set a new password</h2>
    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <div style="margin-top:18px">
        <button type="submit" class="btn btn-teal"><i class="fas fa-key"></i> Update Password</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block extra_css %}
<style>
  input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px}
  p{margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
  ul{margin:8px 0 0 18px;color:var(--muted);font-size:12px}
</style>
{% endblock %}

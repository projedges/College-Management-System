{% extends 'base.html' %}
{% block title %}Reset Email Sent - EduTrack{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div class="card" style="width:100%;max-width:460px;text-align:center">
    <h2 style="font-family:'Outfit',sans-serif;margin-bottom:8px">Reset link sent</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:18px">If the email exists, Django has generated a reset link. In this local setup you can find it in the terminal output.</p>
    <a href="{% url 'login' %}" class="btn btn-teal">Back to Login</a>
  </div>
</div>
{% endblock %}

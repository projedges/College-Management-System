{% extends 'base.html' %}
{% block title %}Password Reset Complete - EduTrack{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">
  <div class="card" style="width:100%;max-width:460px;text-align:center">
    <h2 style="font-family:'Outfit',sans-serif;margin-bottom:8px">Password updated</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:18px">Your password has been changed successfully. You can sign in now.</p>
    <a href="{% url 'login' %}" class="btn btn-teal">Go to Login</a>
  </div>
</div>
{% endblock %}

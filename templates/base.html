<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}EduTrack{% endblock %}</title>
  {% load static %}
  <link rel="icon" type="image/png" href="{% static 'students/images/favicon.png' %}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --teal:#0d7377;--teal-lt:#14a085;--teal-dk:#095c60;
      --gold:#e6a817;--gold-lt:#f5c842;
      --deep:#071e26;--deep2:#0b2d38;
      --bg:#f2f6f8;--surface:#fff;--surface2:#e8f0f3;
      --border:#d8e4ea;--text:#0d1f2d;--muted:#5a7080;
      --green:#10b981;--red:#ef4444;--warning:#f59e0b;
      --sh:0 2px 14px rgba(7,30,38,.08);
      --sh-md:0 6px 28px rgba(7,30,38,.12);
      --r:10px;--r-lg:18px;
    }
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-thumb{background:var(--teal);border-radius:99px}
    a{text-decoration:none}
    .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
    .btn-teal{background:var(--teal);color:#fff;box-shadow:0 2px 10px rgba(13,115,119,.25)}
    .btn-teal:hover{background:var(--teal-dk);transform:translateY(-1px)}
    .btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border)}
    .btn-outline:hover{border-color:var(--teal);color:var(--teal)}
    .btn-danger{background:var(--red);color:#fff}
    .btn-danger:hover{opacity:.9}
    .card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:24px;box-shadow:var(--sh)}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}
    .badge-teal{background:rgba(13,115,119,.1);color:var(--teal)}
    .badge-gold{background:rgba(230,168,23,.12);color:#b88510}
    .badge-green{background:rgba(16,185,129,.1);color:var(--green)}
    .badge-red{background:rgba(239,68,68,.1);color:var(--red)}
    .alert{padding:12px 16px;border-radius:var(--r);font-size:14px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
    .alert-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red)}
    .alert-success{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);color:var(--green)}
    .alert-warning{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--warning)}
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}

{% if user.is_authenticated %}
<!-- ── Session timeout warning modal ── -->
<div id="session-timeout-modal" style="display:none;position:fixed;inset:0;background:rgba(7,30,38,.55);z-index:99999;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div style="background:#fff;border-radius:18px;padding:32px 28px;max-width:380px;width:90%;box-shadow:0 24px 64px rgba(7,30,38,.22);text-align:center">
    <div style="width:56px;height:56px;border-radius:50%;background:rgba(230,168,23,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:#b88510">
      <i class="fas fa-clock"></i>
    </div>
    <div style="font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:#071e26;margin-bottom:8px">Session Expiring Soon</div>
    <div style="font-size:13px;color:#5a7080;line-height:1.6;margin-bottom:20px">
      You will be signed out in <strong id="session-countdown" style="color:#b88510;font-size:16px">—</strong> seconds due to inactivity.
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button onclick="keepSessionAlive()" style="padding:10px 22px;border-radius:9px;background:#0d7377;color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:'Inter',sans-serif">
        <i class="fas fa-rotate-right"></i> Stay Signed In
      </button>
      <a href="{% url 'logout' %}" style="padding:10px 18px;border-radius:9px;background:#f3f4f6;color:#374151;font-size:14px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </a>
    </div>
  </div>
</div>

<script>
(function () {
  var IDLE_TIMEOUT   = {{ request.session_idle_timeout|default:1800 }};
  var WARN_BEFORE    = {{ request.session_warning_before|default:120 }};
  var secondsLeft    = {{ request.session_seconds_left|default:1800 }};
  var warningShown   = false;
  var countdownTimer = null;
  var modal          = document.getElementById('session-timeout-modal');
  var countdownEl    = document.getElementById('session-countdown');

  // Tick every second, decrementing secondsLeft.
  var ticker = setInterval(function () {
    secondsLeft -= 1;

    if (secondsLeft <= 0) {
      clearInterval(ticker);
      window.location.href = '{% url "logout" %}';
      return;
    }

    if (secondsLeft <= WARN_BEFORE && !warningShown) {
      warningShown = true;
      modal.style.display = 'flex';
      startCountdown();
    }

    if (warningShown && countdownEl) {
      countdownEl.textContent = secondsLeft;
    }
  }, 1000);

  function startCountdown() {
    if (countdownEl) countdownEl.textContent = secondsLeft;
  }

  // "Stay signed in" — ping the server with a lightweight fetch to reset the
  // idle timer, then hide the modal and reset our local counter.
  window.keepSessionAlive = function () {
    fetch(window.location.href, { method: 'GET', credentials: 'same-origin' })
      .then(function () {
        secondsLeft  = IDLE_TIMEOUT;
        warningShown = false;
        modal.style.display = 'none';
      })
      .catch(function () {
        // If the fetch fails the user is probably offline; just hide the modal.
        modal.style.display = 'none';
      });
  };
})();
</script>
{% endif %}

<script>{% block extra_js %}{% endblock %}</script>
</body>
</html>
